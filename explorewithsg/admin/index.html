<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../public/favicon.ico">
<link rel="apple-touch-icon" href="../public/apple-touch-icon.svg">
<link rel="shortcut icon" href="../public/favicon.ico">
<title>Admin Login — SG Leisure &amp; Taxis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b25;
    --surface2: #1d2435;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #555e75;
    --accent: #1db88a;
    --accent-dim: rgba(29,184,138,0.12);
    --red: #f05b5b;
    --red-dim: rgba(240,91,91,0.1);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --r: 10px;
    --r-sm: 6px;
  }
  body.light {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f5f6f8;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.14);
    --text: #111318;
    --text2: #52596b;
    --text3: #9199ad;
    --accent: #0f9e73;
    --accent-dim: rgba(15,158,115,0.1);
    --red: #d63c3c;
    --red-dim: rgba(214,60,60,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: background 0.25s, color 0.25s;
    padding: 20px;
  }

  /* Background subtle grid pattern */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(29,184,138,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(29,184,138,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .login-wrap {
    width: 100%; max-width: 400px; position: relative; z-index: 1;
    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Brand header */
  .brand {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-bottom: 32px;
  }
  .brand-icon {
    width: 44px; height: 44px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { width: 24px; height: 24px; }
  .brand-text { line-height: 1.2; }
  .brand-name { font-size: 18px; font-weight: 600; color: var(--text); }
  .brand-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Card */
  .login-card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 32px 28px;
  }
  .card-title {
    font-size: 20px; font-weight: 600; color: var(--text);
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 13px; color: var(--text3); margin-bottom: 28px;
  }

  /* Form */
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .form-label svg { width: 12px; height: 12px; opacity: 0.6; }
  .form-input {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--r-sm); color: var(--text);
    font-family: var(--font); font-size: 14px; padding: 11px 14px;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .form-input::placeholder { color: var(--text3); }

  /* Password toggle */
  .pw-wrap { position: relative; }
  .pw-wrap .form-input { padding-right: 42px; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--text3);
    padding: 4px; display: flex; align-items: center;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--text2); }
  .pw-toggle svg { width: 15px; height: 15px; }

  /* Error */
  .error-msg {
    display: none; align-items: center; gap: 8px;
    background: var(--red-dim); border: 1px solid rgba(240,91,91,0.2);
    border-radius: var(--r-sm); padding: 10px 12px;
    font-size: 13px; color: var(--red); margin-bottom: 16px;
  }
  .error-msg.show { display: flex; }
  .error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Submit */
  .btn-submit {
    width: 100%; background: var(--accent); color: #0a1a13;
    border: none; border-radius: var(--r-sm); font-family: var(--font);
    font-size: 14px; font-weight: 600; padding: 12px;
    cursor: pointer; transition: all 0.15s; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:hover { background: #22d19d; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-submit svg { width: 15px; height: 15px; }
  .spinner {
    display: none; width: 15px; height: 15px;
    border: 2px solid rgba(0,0,0,0.2); border-top-color: #0a1a13;
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .login-footer {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: var(--text3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .login-footer svg { width: 12px; height: 12px; }

  /* Theme toggle */
  .theme-btn {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.15s;
  }
  .theme-btn:hover { background: var(--surface2); }
  .theme-btn svg { width: 15px; height: 15px; color: var(--text2); }
  .icon-moon { display: block; }
  .icon-sun  { display: none; }
  body.light .icon-moon { display: none; }
  body.light .icon-sun  { display: block; }

  /* Back to site link */
  .back-link {
    position: fixed; top: 20px; left: 20px; z-index: 10;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text3); text-decoration: none;
    padding: 7px 12px; background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; transition: all 0.15s;
  }
  .back-link:hover { color: var(--text2); background: var(--surface2); }
  .back-link svg { width: 12px; height: 12px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    body { padding: 16px; }
    .login-card { padding: 28px 20px; }
    .btn-submit { font-size: 15px; padding: 14px; }
    .form-input { padding: 12px 14px; font-size: 15px; }
    .back-link, .theme-btn { top: 12px; }
    .back-link { left: 12px; } .theme-btn { right: 12px; }
    .brand-name { font-size: 1rem; }
    .login-wrap { max-width: 100%; }
  }
</style>
</head>
<body>

<a href="/" class="back-link">
  <svg viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Back to website
</a>

<button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5A6 6 0 017 3a6 6 0 100 10 6 6 0 006.5-3.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
  <svg class="icon-sun"  viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
</button>

<div class="login-wrap">

  <div class="brand">
    <img src="../public/logo.png" alt="SG Leisure and Taxis" style="height:48px;width:auto;display:block;margin:0 auto 6px;background:#fff;border-radius:10px;padding:6px 14px">
    <div style="font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);text-align:center">Admin portal</div>
  </div>

  <div class="login-card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to manage bookings, drivers and packages</div>

    <div class="error-msg" id="error-msg">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3M8 10.5v.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span id="error-text">Incorrect username or password.</span>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="username">
          <svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M2 13c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Username
        </label>
        <input
          class="form-input" type="text" id="username"
          placeholder="Enter your username" autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          <svg viewBox="0 0 14 14" fill="none"><rect x="3" y="6" width="8" height="6" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 6V4.5a2 2 0 014 0V6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Password
        </label>
        <div class="pw-wrap">
          <input
            class="form-input" type="password" id="password"
            placeholder="Enter your password" autocomplete="current-password"
            required
          >
          <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-toggle-btn" title="Show/hide password">
            <svg id="eye-icon" viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" type="submit" id="submit-btn">
        <div class="spinner" id="spinner"></div>
        <svg id="lock-icon" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span id="btn-label">Sign in</span>
      </button>
    </form>
  </div>

  <div class="login-footer">
    <svg viewBox="0 0 14 14" fill="none"><rect x="2" y="5" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 5V4a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    Restricted access — authorised users only
  </div>

</div>

<script>
  /* ── Theme ── */
  (function() {
    if (localStorage.getItem('sg_theme') === 'light') document.body.classList.add('light');
  })();
  function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('sg_theme', document.body.classList.contains('light') ? 'light' : 'dark');
  }

  /* ── Password visibility ── */
  function togglePw() {
    const inp = document.getElementById('password');
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    document.getElementById('eye-icon').innerHTML = isText
      ? `<ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/>`
      : `<ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.3"/><line x1="3" y1="13" x2="13" y2="3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>`;
  }

  /* ── Login ── */
  /*
   * IMPORTANT: This is a client-side demo guard.
   * For production, replace this with a real server-side
   * authentication endpoint (e.g. Supabase Auth, Firebase Auth,
   * or your own backend API). Never store real passwords in JS.
   *
   * Default credentials for testing:
   *   Username: admin
   *   Password: sg@admin2026
   *
   * Change ADMIN_USER and ADMIN_PASS below before publishing,
   * or better yet — connect to Supabase Auth (see README.md).
   */
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'sg@admin2026';
  const SESSION_KEY = 'sg_admin_session';
  const SESSION_DURATION_MS = 8 * 60 * 60 * 1000; // 8 hours

  /* If already logged in, go straight to dashboard */
  (function() {
    const s = sessionStorage.getItem(SESSION_KEY);
    if (s) {
      try {
        const { expires } = JSON.parse(s);
        if (Date.now() < expires) {
          window.location.href = 'dashboard.html';
        }
      } catch(e) {
        sessionStorage.removeItem(SESSION_KEY);
      }
    }
  })();

  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.add('show');
    document.getElementById('password').focus();
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    const spinner = document.getElementById('spinner');
    const label = document.getElementById('btn-label');
    const lockIcon = document.getElementById('lock-icon');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    lockIcon.style.display = on ? 'none' : 'block';
    label.textContent = on ? 'Signing in…' : 'Sign in';
  }

  function handleLogin(e) {
    e.preventDefault();
    document.getElementById('error-msg').classList.remove('show');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if (!user || !pass) {
      showError('Please enter both username and password.');
      return;
    }

    setLoading(true);

    /* Simulate a brief network delay so it feels like a real auth call */
    setTimeout(() => {
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({
          user,
          expires: Date.now() + SESSION_DURATION_MS
        }));
        window.location.href = 'dashboard.html';
      } else {
        setLoading(false);
        showError('Incorrect username or password. Please try again.');
        document.getElementById('password').value = '';
      }
    }, 800);
  }
</script>
</body>
</html>
